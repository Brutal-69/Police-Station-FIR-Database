{% extends 'base.html' %}
{% block title %}File New FIR{% endblock %}
{% block content %}
<div class="page-header">
    <h1>FILE <span>NEW FIR</span></h1>
    <a href="/firs" class="btn btn-outline">← Back</a>
</div>

<form method="POST" action="/fir/new">
    <div class="card">
        <div class="section-title">FIR Details</div>
        <div class="form-grid">
            <div class="form-group">
                <label>FIR Number</label>
                <input type="text" name="fir_number" placeholder="e.g. FIR-2024-001" required>
            </div>
            <div class="form-group">
                <label>Date Filed</label>
                <input type="date" name="date_filed" value="{{ today }}" required>
            </div>
            <div class="form-group">
                <label>Assigned Officer</label>
                <select name="officer_id" required>
                    <option value="">-- Select Officer --</option>
                    {% for o in officers %}
                    <option value="{{ o.officer_id }}">{{ o.rank }} {{ o.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Police Station</label>
                <select name="station_id" required>
                    <option value="">-- Select Station --</option>
                    {% for s in stations %}
                    <option value="{{ s.station_id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Open">Open</option>
                    <option value="Under Investigation">Under Investigation</option>
                </select>
            </div>
            <div class="form-group full">
                <label>Incident Description</label>
                <textarea name="description" placeholder="Describe the incident..." required></textarea>
            </div>
        </div>

        <div class="section-title">Complainant Information</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="c_name" placeholder="Complainant's full name" required>
            </div>
            <div class="form-group">
                <label>CNIC</label>
                <input type="text" name="c_cnic" placeholder="e.g. 17301-1234567-1" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="c_phone" placeholder="e.g. 0300-1234567">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="c_address" placeholder="Complainant's address">
            </div>
        </div>

        <div style="margin-top:1.5rem; display:flex; gap:0.75rem;">
            <button type="submit" class="btn btn-primary">Submit FIR</button>
            <a href="/firs" class="btn btn-outline">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
