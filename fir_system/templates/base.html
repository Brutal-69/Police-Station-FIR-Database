<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIR Management System{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f;
            --surface: #111418;
            --surface2: #181c22;
            --border: #232830;
            --accent: #c8922a;
            --accent2: #e8b84b;
            --red: #c0392b;
            --green: #27ae60;
            --blue: #2980b9;
            --text: #d4d8de;
            --text-dim: #6b7280;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --display: 'Bebas Neue', cursive;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
        }
        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-family: var(--display);
            font-size: 1.6rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-brand span { color: var(--text-dim); font-size: 0.9rem; }
        .nav-links { display: flex; gap: 0.25rem; flex: 1; }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: var(--mono);
            font-size: 0.78rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.4rem 0.9rem;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            background: rgba(200,146,42,0.1);
        }
        /* LAYOUT */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        /* PAGE HEADER */
        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-family: var(--display);
            font-size: 2.5rem;
            color: var(--text);
            letter-spacing: 2px;
        }
        .page-header h1 span { color: var(--accent); }
        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
        }
        /* STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            border-left: 3px solid var(--accent);
        }
        .stat-card.red { border-left-color: var(--red); }
        .stat-card.green { border-left-color: var(--green); }
        .stat-card.blue { border-left-color: var(--blue); }
        .stat-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: var(--display); font-size: 2.5rem; color: var(--text); line-height: 1.1; margin-top: 0.25rem; }
        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th {
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:hover td { background: var(--surface2); }
        /* BADGES */
        .badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
        }
        .badge-open { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
        .badge-investigating { background: rgba(200,146,42,0.15); color: var(--accent2); border: 1px solid rgba(200,146,42,0.3); }
        .badge-closed { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
        .badge-dismissed { background: rgba(107,114,128,0.15); color: var(--text-dim); border: 1px solid var(--border); }
        .badge-arrested { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
        .badge-large { background: rgba(200,146,42,0.15); color: var(--accent2); border: 1px solid rgba(200,146,42,0.3); }
        .badge-released { background: rgba(39,174,96,0.15); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
        .badge-convicted { background: rgba(107,114,128,0.2); color: var(--text-dim); border: 1px solid var(--border); }
        /* BUTTONS */
        .btn {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.78rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0.55rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; font-weight: 600; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.7rem; }
        /* FORMS */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group.full { grid-column: 1 / -1; }
        label {
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        input, select, textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            padding: 0.6rem 0.9rem;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 100px; }
        select option { background: var(--surface2); }
        /* SECTION DIVIDER */
        .section-title {
            font-family: var(--mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        /* FLASH */
        .flash { padding: 0.75rem 1.25rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
        .flash-success { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; }
        /* DETAIL ROW */
        .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .detail-item label { display: block; font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 0.25rem; }
        .detail-item span { font-size: 0.95rem; }
        /* LINK */
        a.link { color: var(--accent); text-decoration: none; }
        a.link:hover { color: var(--accent2); text-decoration: underline; }
        /* FILTER BAR */
        .filter-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; }
        .filter-bar input, .filter-bar select { padding: 0.45rem 0.9rem; font-size: 0.85rem; }
    </style>
</head>
<body>
<nav>
    <a class="nav-brand" href="/">⬡ FIR <span>SYSTEM</span></a>
    <div class="nav-links">
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
        <a href="/firs" {% if '/firs' in request.path %}class="active"{% endif %}>FIR Records</a>
        <a href="/suspects" {% if '/suspects' in request.path %}class="active"{% endif %}>Suspects</a>
        <a href="/officers" {% if '/officers' in request.path %}class="active"{% endif %}>Officers</a>
    </div>
</nav>
<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
